name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libx11-dev libxtst-dev

      - name: Cargo check
        run: cd src-tauri && cargo check

      - name: Cargo clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Cargo fmt
        run: cd src-tauri && cargo fmt --check
